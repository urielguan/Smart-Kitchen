<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧食安管理平台</title>

    <!-- Element Plus CSS（CDN，需联网） -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">

    <!-- 主样式文件 -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- 总布局容器 -->
    <div class="app-container">

        <!-- ========== 左侧边栏 ========== -->
        <aside class="sidebar">
            <div class="sidebar-header">🍽️ 智慧食安</div>
            <div class="sidebar-menu" id="sidebarMenu">
                <!-- 侧边栏菜单由 sidebar.js 动态渲染 -->
            </div>
        </aside>

        <!-- ========== 主内容区 ========== -->
        <div class="main-container">

            <!-- 顶部导航栏 -->
            <header class="header">
                <div class="breadcrumb" id="breadcrumb">仓储管理 / 仓库信息管理</div>
                <div class="user-info">
                    <div class="avatar">管</div>
                    <span>管理员</span>
                </div>
            </header>

            <!-- 内容滚动区 -->
            <main class="content" id="mainContent">
                <!-- 主内容由各模块 JS 动态渲染 -->
            </main>

        </div>
    </div>

    <!-- ========== 全局组件 ========== -->

    <!-- Toast 提示框 -->
    <div class="toast" id="toast"></div>

    <!-- 弹窗遮罩层（modal 作为子元素，由 flexbox 居中） -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal"></div>
    </div>

    <!-- AI 悬浮提示框 -->
    <div class="ai-tooltip" id="aiTooltip"></div>

    <!-- ========== JavaScript 脚本加载顺序 ========== -->

    <!-- 1. Mock 数据 -->
    <script src="js/mock-data.js"></script>

    <!-- 2. 工具函数 & 全局状态 -->
    <script src="js/utils.js"></script>

    <!-- 3. 侧边栏 & 页面切换 -->
    <script src="js/sidebar.js"></script>

    <!-- 4. 业务模块 -->
    <script src="js/warehouse.js"></script>
    <script src="js/material.js"></script>
    <script src="js/recipe.js"></script>
    <script src="js/org.js"></script>
    <script src="js/supplier.js"></script>
    <script src="js/purchase.js"></script>
    <script src="js/purchasePlan.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/inbound.js"></script>
    <script src="js/outbound.js"></script>
    <script src="js/stocktake.js"></script>
    <script src="js/recipePlan.js"></script>
    <script src="js/cook.js"></script>
    <script src="js/sample.js"></script>
    <script src="js/healthCheck.js"></script>
    <script src="js/cctv.js"></script>
    <script src="js/device.js"></script>
    <script src="js/employee.js"></script>
    <script src="js/rolePermission.js"></script>
    <script src="js/review.js"></script>

    <!-- 5. 应用初始化入口 -->
    <script src="js/app.js"></script>

</body>
</html>
